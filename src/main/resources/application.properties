spring.application.name=server

# Không lưu session HTTP ra đĩa — tránh lỗi deserialize SPRING_SECURITY_CONTEXT khi restart (devtools)
server.servlet.session.persistent=false

# ===== MySQL - Database thitracnghiem =====
spring.datasource.url=jdbc:mysql://localhost:3306/thitracnghiem
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Thymeleaf - tắt cache khi phát triển
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Timezone server
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh

# Multipart file upload (hỗ trợ upload file đề thi/câu hỏi)
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=30MB
