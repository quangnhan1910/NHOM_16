<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Không có quyền truy cập - Hệ thống Thi trắc nghiệm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <style>
        .access-denied-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 120px);
        }
        .access-denied-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 48px 40px;
            text-align: center;
            max-width: 440px;
            width: 100%;
        }
        .access-denied-icon {
            width: 80px;
            height: 80px;
            background: #FEF2F2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .access-denied-title {
            font-size: 22px;
            font-weight: 700;
            color: #1E293B;
            margin: 0 0 12px;
        }
        .access-denied-desc {
            font-size: 14px;
            color: #64748B;
            line-height: 1.6;
            margin: 0 0 32px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #1C74E9;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .back-btn:hover {
            background: #1557C0;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <div class="logo-section">
                <div class="logo-icon">
                    <img class="logo-icon-img" th:src="@{/images/brand/uniexam-logo.png}" src="/images/brand/uniexam-logo.png" width="38" height="34" alt=""/>
                </div>
                <h1 class="logo-text">UniExam <span class="logo-staff">Staff</span></h1>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="access-denied-wrapper">
            <div class="access-denied-card">
                <div class="access-denied-icon">
                    <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18 4L32 32H4L18 4Z" stroke="#DC2626" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M18 14V20" stroke="#DC2626" stroke-width="2.5" stroke-linecap="round"/>
                        <circle cx="18" cy="25" r="1.5" fill="#DC2626"/>
                    </svg>
                </div>
                <h2 class="access-denied-title">Không có quyền truy cập</h2>
                <p class="access-denied-desc">
                    Bạn không có quyền truy cập vào khu vực này.<br>
                    Chỉ tài khoản <strong>Quản trị viên</strong> mới được phép truy cập.<br>
                    Vui lòng liên hệ quản trị viên nếu bạn cần hỗ trợ.
                </p>
                <a href="/admin" class="back-btn">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M10 12L6 8L10 4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Quay lại trang chính
                </a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-container">
            <div class="footer-divider">
                <span class="divider-line"></span>
                <span class="footer-heading">PHÒNG CÔNG NGHỆ THÔNG TIN</span>
                <span class="divider-line"></span>
            </div>
        </div>
    </footer>
</body>
</html>
