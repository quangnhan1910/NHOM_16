<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import Thành Công - UniExam</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS riêng -->
    <link rel="stylesheet" th:href="@{/css/kiem-tra-cau-hoi.css}" href="/css/kiem-tra-cau-hoi.css">
    <link rel="stylesheet" th:href="@{/css/import-thanh-cong.css}" href="/css/import-thanh-cong.css">
    <link rel="stylesheet" th:if="${dungGiaoDienGiangVien == true}" th:href="@{/css/lecturer/lecturer-layout.css}">
</head>
<body>

<div th:classappend="${dungGiaoDienGiangVien == true} ? 'lecturer-shell'">
    <aside th:if="${dungGiaoDienGiangVien == true}" th:replace="~{fragments/lecturer-sidebar :: sidebar (activeNav='ngan-hang')}"></aside>
    <div th:classappend="${dungGiaoDienGiangVien == true} ? 'lecturer-main'">
    <!-- App Container -->
    <div class="app-container">
        
        <main class="main-content">

            <div th:replace="~{fragments/lecturer-hub-back :: backToKhoaHoc}"></div>
            <!-- Context Header (Tái sử dụng style từ trang kiểm tra) -->
            <div class="context-header">
                <div class="breadcrumb">
                    <span class="text-secondary">Ngân hàng câu hỏi</span>
                    <i class="fa-solid fa-chevron-right separator"></i>
                    <span class="text-primary-dark">Thêm câu hỏi mới</span>
                </div>
            </div>

            <!-- Success Center Message -->
            <div class="success-wrapper">
                <div class="success-icon-container">
                    <div class="icon-circle">
                        <i class="fa-solid fa-check"></i>
                    </div>
                </div>
                
                <h1 class="success-title">Import thành công!</h1>
                
                <p class="success-message">
                    Đã thêm thành công <strong id="importedCount">0</strong> câu hỏi vào Ngân hàng câu hỏi.
                </p>
                
                <a href="/ngan-hang-cau-hoi" class="btn btn-primary btn-lg">Quay lại Ngân hàng câu hỏi</a>
            </div>

    </main>
    </div>
    </div>
</div>

    <script>
        const count = sessionStorage.getItem('importedCount');
        if (count) {
            document.getElementById('importedCount').textContent = count;
            sessionStorage.removeItem('importedCount');
        }
    </script>

</body>
</html>
