<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sửa trường - Hệ thống Thi trắc nghiệm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <style>
        .breadcrumb { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
        .breadcrumb a { font-size: 14px; font-weight: 500; color: #64748B; text-decoration: none; }
        .breadcrumb a:hover { color: #1C74E9; }
        .breadcrumb .active { font-size: 14px; font-weight: 600; color: #1C74E9; }
        .breadcrumb-separator { color: #94A3B8; font-size: 14px; }
        .page-header { margin-bottom: 24px; }
        .page-title { font-size: 30px; font-weight: 800; color: #0F172A; margin-bottom: 8px; letter-spacing: -0.75px; }
        .page-description { font-size: 16px; color: #64748B; }
        .form-card { background: #FFFFFF; border: 1px solid #E2E8F0; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05); max-width: 720px; }
        .form-card-header { background: rgba(28, 116, 233, 0.05); border-bottom: 1px solid #E2E8F0; padding: 16px 24px; font-size: 18px; font-weight: 700; color: #1C74E9; }
        .form-card-body { padding: 24px; display: flex; flex-direction: column; gap: 20px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group.full-width { grid-column: 1 / -1; }
        .form-label { font-size: 14px; font-weight: 700; color: #334155; }
        .form-label.required::after { content: ' *'; color: #EF4444; }
        .form-input, .form-select {
            padding: 9px 17px; background: #FFF; border: 1px solid #CBD5E1; border-radius: 8px; font-size: 14px; color: #0F172A; outline: none;
        }
        .form-input:focus, .form-select:focus { border-color: #1C74E9; }
        .form-select { cursor: pointer; appearance: none; }
        .form-actions { display: flex; justify-content: flex-end; gap: 12px; padding-top: 16px; border-top: 1px solid #F1F5F9; }
        .btn-primary { padding: 10px 20px; background: #1C74E9; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; }
        .btn-primary:hover { background: #1D4ED8; }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-secondary { padding: 8px 20px; background: #FFF; border: 1px solid #E2E8F0; border-radius: 8px; font-size: 14px; font-weight: 600; color: #475569; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-secondary:hover { background: #F8FAFC; }
        .form-error { font-size: 12px; color: #EF4444; display: none; }
        .form-group.has-error .form-input, .form-group.has-error .form-select { border-color: #EF4444; }
        .form-group.has-error .form-error { display: block; }
        .toast { position: fixed; top: 24px; right: 24px; padding: 12px 20px; border-radius: 8px; font-weight: 600; z-index: 2000; font-size: 14px; }
        .toast.success { background: #10B981; color: white; }
        .toast.error { background: #EF4444; color: white; }
        .org-content { max-width: 1152px; width: 100%; margin: 0 auto; }
    </style>
</head>
<body>
    <div class="admin-shell">
        <aside th:replace="~{fragments/admin-sidebar :: sidebar (activeNav='co-cau')}"></aside>
        <div class="admin-main">
    <div class="admin-wrapper">
        <header class="admin-header">
            <div class="header-left">
                <div class="search-input-wrapper">
                    <input type="text" class="search-input" placeholder="Tìm kiếm...">
                </div>
            </div>
            <div class="header-right">
                <button class="header-icon-btn">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="6" r="3" stroke="#64748B" stroke-width="1.5"/><path d="M3 17C3 14.5 5.5 13 10 13C14.5 13 17 14.5 17 17" stroke="#64748B" stroke-width="1.5" stroke-linecap="round"/></svg>
                </button>
            </div>
        </header>
        <main class="admin-content">
            <div class="org-content">
                <div class="breadcrumb">
                    <a th:href="@{/admin/co-cau-to-chuc}">Cấu hình</a>
                    <span class="breadcrumb-separator">/</span>
                    <a th:href="@{/admin/co-cau-to-chuc}">Cơ cấu tổ chức</a>
                    <span class="breadcrumb-separator">/</span>
                    <a href="#" id="breadcrumbDetail">Chi tiết trường</a>
                    <span class="breadcrumb-separator">/</span>
                    <span class="active">Sửa</span>
                </div>
                <div class="page-header">
                    <h1 class="page-title">Sửa trường</h1>
                    <p class="page-description">Cập nhật thông tin trường.</p>
                </div>
                <div class="form-card">
                    <div class="form-card-header">Chỉnh sửa thông tin</div>
                    <form id="formSuaTruong" class="form-card-body">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label required" for="ten">Tên trường</label>
                                <input type="text" class="form-input" id="ten" name="ten" required placeholder="vd: Đại học Bách Khoa Hà Nội">
                                <span class="form-error">Tên trường không được để trống</span>
                            </div>
                            <div class="form-group">
                                <label class="form-label required" for="capBac">Cấp bậc</label>
                                <select class="form-select" id="capBac" name="capBac" required>
                                    <option value="">-- Chọn cấp bậc --</option>
                                    <option value="DAI_HOC">Đại học</option>
                                    <option value="CAO_DANG">Cao đẳng</option>
                                    <option value="TRUNG_CAP">Trung cấp</option>
                                </select>
                                <span class="form-error">Cấp bậc không được để trống</span>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label required" for="maDinhDanh">Mã định danh</label>
                                <input type="text" class="form-input" id="maDinhDanh" name="maDinhDanh" required placeholder="vd: HUST">
                                <span class="form-error">Mã định danh không được để trống</span>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="diaChi">Địa chỉ</label>
                                <input type="text" class="form-input" id="diaChi" name="diaChi" placeholder="vd: Hai Bà Trưng, Hà Nội">
                            </div>
                        </div>
                        <div class="form-actions">
                            <a th:href="@{/admin/co-cau-to-chuc}" class="btn-secondary">Hủy</a>
                            <button type="submit" class="btn-primary" id="btnLuu">Lưu</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
        </div>
    </div>
    <script th:inline="javascript">
        (function () {
            var truongId = /*[[${truongId}]]*/ 0;
            if (!truongId) {
                if (typeof showToast === 'function') showToast('Không tìm thấy mã trường.', true);
                else alert('Không tìm thấy mã trường.');
                return;
            }
            document.getElementById('breadcrumbDetail').href = '/admin/co-cau-to-chuc/truong/' + truongId;

            function showToast(msg, isError) {
                var el = document.createElement('div');
                el.className = 'toast ' + (isError ? 'error' : 'success');
                el.textContent = msg;
                document.body.appendChild(el);
                setTimeout(function () { el.remove(); }, 3500);
            }

            fetch('/api/truong/' + truongId, { headers: { 'Content-Type': 'application/json' } })
                .then(function (r) { return r.json(); })
                .then(function (res) {
                    if (!res.success || !res.data) return;
                    var d = res.data;
                    document.getElementById('ten').value = d.ten || '';
                    document.getElementById('capBac').value = (d.capBac || '').toUpperCase();
                    document.getElementById('maDinhDanh').value = d.maDinhDanh || '';
                    document.getElementById('diaChi').value = d.diaChi || '';
                });

            document.getElementById('formSuaTruong').addEventListener('submit', function (e) {
                e.preventDefault();
                var ten = document.getElementById('ten').value.trim();
                var capBac = document.getElementById('capBac').value;
                var maDinhDanh = document.getElementById('maDinhDanh').value.trim();
                var diaChi = document.getElementById('diaChi').value.trim();
                var ok = true;
                document.querySelectorAll('.form-group').forEach(function (g) { g.classList.remove('has-error'); });
                if (!ten) { document.getElementById('ten').closest('.form-group').classList.add('has-error'); ok = false; }
                if (!capBac) { document.getElementById('capBac').closest('.form-group').classList.add('has-error'); ok = false; }
                if (!maDinhDanh) { document.getElementById('maDinhDanh').closest('.form-group').classList.add('has-error'); ok = false; }
                if (!ok) return;
                var btn = document.getElementById('btnLuu');
                btn.disabled = true;
                fetch('/api/truong/' + truongId, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ten: ten, capBac: capBac, maDinhDanh: maDinhDanh, diaChi: diaChi })
                })
                    .then(function (r) { return r.json(); })
                    .then(function (res) {
                        if (res.success) {
                            showToast('Cập nhật trường thành công!');
                            setTimeout(function () { window.location.href = '/admin/co-cau-to-chuc/truong/' + truongId; }, 800);
                        } else {
                            showToast(res.message || 'Cập nhật thất bại.', true);
                            btn.disabled = false;
                        }
                    })
                    .catch(function () {
                        showToast('Lỗi kết nối.', true);
                        btn.disabled = false;
                    });
            });
        })();
    </script>
</body>
</html>
