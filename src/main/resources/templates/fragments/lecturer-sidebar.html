<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
  Fragment: sidebar (activeNav)
  activeNav: dashboard | khoa-hoc | ngan-hang | de-thi | giam-sat | thong-ke
  Model (tùy chọn): lecturerSidebarTen, lecturerSidebarEmail — từ LecturerViewModelAdvice
-->
<aside th:fragment="sidebar (activeNav)" class="lecturer-sidebar" aria-label="Menu giảng viên">
    <div class="lecturer-sidebar-brand">
        <button type="button" class="lecturer-sidebar-toggle" id="lecturerSidebarToggle"
                title="Thu gọn / mở rộng menu" aria-expanded="true" aria-controls="lecturer-sidebar-nav">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M11.25 4.5L6.75 9l4.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <div class="lecturer-sidebar-brand-main">
            <div class="lecturer-sidebar-logo" aria-hidden="true">
                <img class="lecturer-sidebar-logo-img" th:src="@{/images/lecturer/background2.png}" src="/images/lecturer/background2.png" width="40" height="40" alt=""/>
            </div>
            <div class="lecturer-sidebar-titles">
                <div class="lecturer-sidebar-title">Exam Manager</div>
                <div class="lecturer-sidebar-subtitle">Giáo viên hướng dẫn</div>
            </div>
        </div>
    </div>

    <nav id="lecturer-sidebar-nav" class="lecturer-sidebar-nav" aria-label="Điều hướng giảng viên">
        <a th:href="@{/lecturer/bang-dieu-khien-giang-vien}"
           class="lecturer-nav-link"
           th:classappend="${activeNav == 'dashboard'} ? ' is-active'">
            <span class="lecturer-nav-icon" aria-hidden="true">
                <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="2.5" y="2.5" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.33"/>
                    <rect x="10" y="2.5" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.33"/>
                    <rect x="2.5" y="10" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.33"/>
                    <rect x="10" y="10" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.33"/>
                </svg>
            </span>
            <span>Bảng điều khiển</span>
        </a>
        <a th:href="@{/lecturer/khoahoccoatoi}"
           class="lecturer-nav-link"
           th:classappend="${activeNav == 'khoa-hoc'} ? ' is-active'">
            <span class="lecturer-nav-icon" aria-hidden="true">
                <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 3.5h9a1.5 1.5 0 011.5 1.5v10a1 1 0 01-1 1H5.5a2.5 2.5 0 01-2.5-2.5v-9A1.5 1.5 0 014 3.5z" stroke="currentColor" stroke-width="1.33" stroke-linejoin="round"/>
                    <path d="M6 6.5h6M6 9.5h4" stroke="currentColor" stroke-width="1.33" stroke-linecap="round"/>
                    <path d="M13 3.5V2a1 1 0 00-1-1H6.5a2.5 2.5 0 00-2.5 2.5v1" stroke="currentColor" stroke-width="1.33" stroke-linecap="round"/>
                </svg>
            </span>
            <span>Khóa học của tôi</span>
        </a>
        <a th:href="@{/ngan-hang-cau-hoi}"
           class="lecturer-nav-link"
           th:classappend="${activeNav == 'ngan-hang'} ? ' is-active'">
            <span class="lecturer-nav-icon" aria-hidden="true">
                <img class="lecturer-nav-icon-img" th:src="@{/images/lecturer/container.png}" src="/images/lecturer/container.png" width="18" height="18" alt=""/>
            </span>
            <span>Ngân hàng câu hỏi</span>
        </a>
        <a th:href="@{/de-thi}"
           class="lecturer-nav-link"
           th:classappend="${activeNav == 'de-thi'} ? ' is-active'">
            <span class="lecturer-nav-icon" aria-hidden="true">
                <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="3.5" y="2.5" width="11" height="13" rx="1.5" stroke="currentColor" stroke-width="1.33"/>
                    <path d="M6 6.5h6M6 9.5h6M6 12.5h4" stroke="currentColor" stroke-width="1.33" stroke-linecap="round"/>
                </svg>
            </span>
            <span>Quản lý đề thi</span>
        </a>
        <a th:href="@{/lecturer/giam-sat-thi}"
           class="lecturer-nav-link"
           th:classappend="${activeNav == 'giam-sat'} ? ' is-active'">
            <span class="lecturer-nav-icon" aria-hidden="true">
                <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 14L7 10l3 3 5-6" stroke="currentColor" stroke-width="1.33" stroke-linecap="round" stroke-linejoin="round"/>
                    <rect x="2.5" y="3.5" width="13" height="11" rx="1.5" stroke="currentColor" stroke-width="1.33"/>
                </svg>
            </span>
            <span>Giám sát thời gian thực</span>
        </a>
        <a th:href="@{/lecturer/thong-ke-ket-qua-thi}"
           class="lecturer-nav-link"
           th:classappend="${activeNav == 'thong-ke'} ? ' is-active'">
            <span class="lecturer-nav-icon" aria-hidden="true">
                <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 14V8M9 14V5M14 14v-4" stroke="currentColor" stroke-width="1.33" stroke-linecap="round"/>
                    <path d="M3 15.5h12" stroke="currentColor" stroke-width="1.33" stroke-linecap="round"/>
                </svg>
            </span>
            <span>Kết quả &amp; Báo cáo</span>
        </a>
    </nav>

    <div class="lecturer-sidebar-footer">
        <div class="lecturer-sidebar-user">
            <div class="lecturer-sidebar-user-text">
                <div class="lecturer-sidebar-user-name"
                     th:text="${lecturerSidebarTen != null and not #strings.isEmpty(lecturerSidebarTen)} ? ${lecturerSidebarTen} : 'Giảng viên'">Giảng viên</div>
                <div class="lecturer-sidebar-user-email"
                     th:if="${lecturerSidebarEmail != null and not #strings.isEmpty(lecturerSidebarEmail)}"
                     th:text="${lecturerSidebarEmail}">email@edu.vn</div>
            </div>
            <form th:action="@{/logout}" method="post" class="lecturer-sidebar-logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="lecturer-sidebar-logout" title="Đăng xuất" aria-label="Đăng xuất">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="M6.5 15H4.25A1.75 1.75 0 012.5 13.25V4.75A1.75 1.75 0 014.25 3H6.5" stroke="currentColor" stroke-width="1.33" stroke-linecap="round"/>
                        <path d="M12 13.5L15.5 9 12 4.5M15.5 9H6.5" stroke="currentColor" stroke-width="1.33" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </form>
        </div>
    </div>
    <script>
        (function () {
            var shell = document.querySelector('.lecturer-shell');
            var btn = document.getElementById('lecturerSidebarToggle');
            if (!shell || !btn) return;
            var key = 'lecturer-sidebar-collapsed';
            function apply(collapsed) {
                shell.classList.toggle('sidebar-collapsed', collapsed);
                btn.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
                var label = collapsed ? 'Mở rộng menu' : 'Thu gọn menu';
                btn.setAttribute('aria-label', label);
                btn.setAttribute('title', label);
                try { localStorage.setItem(key, collapsed ? '1' : '0'); } catch (e) {}
            }
            try {
                if (localStorage.getItem(key) === '1') apply(true);
            } catch (e) {}
            btn.addEventListener('click', function () {
                apply(!shell.classList.contains('sidebar-collapsed'));
            });
        })();
    </script>
</aside>
</html>
