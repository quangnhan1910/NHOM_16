<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉnh sửa đề thi - UniExam</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" th:unless="${dungGiaoDienGiangVien == true}" th:href="@{/css/admin.css}">
    <link rel="stylesheet" th:if="${dungGiaoDienGiangVien == true}" th:href="@{/css/lecturer/lecturer-layout.css}">
    <link rel="stylesheet" th:href="@{/css/sua-de-thi.css}">
</head>
<body>

<div th:class="${dungGiaoDienGiangVien == true} ? 'de-thi-quan-ly-root lecturer-shell de-thi-sua-page' : 'de-thi-quan-ly-root admin-shell de-thi-sua-page'">
    <aside th:replace="${dungGiaoDienGiangVien == true} ? ~{fragments/lecturer-sidebar :: sidebar (activeNav='de-thi')} : ~{fragments/admin-sidebar :: sidebar (activeNav='de-thi')}"></aside>
    <div th:class="${dungGiaoDienGiangVien == true} ? 'lecturer-main de-thi-sua-wrap' : 'admin-main de-thi-sua-wrap'">
        <div th:replace="~{fragments/lecturer-hub-back :: backToKhoaHoc}"></div>
        <div class="app-container">
            <main class="main-editor">

                <div class="editor-header">
                    <div class="breadcrumb">
                        <a href="/de-thi">Đề thi</a>
                        <i class="fa-solid fa-chevron-right"></i>
                        <a href="/de-thi/them-moi">Thêm đề thi mới</a>
                        <i class="fa-solid fa-chevron-right"></i>
                        <span class="current">Chỉnh sửa nội dung</span>
                    </div>

                    <div class="title-bar">
                        <div class="title-group">
                            <h1 class="page-title">CS101: Nhập môn Khoa học Máy tính</h1>
                            <div class="title-meta">
                                <span class="badge-tag">GIỮA KỲ 2026</span>
                                <div class="score-input-widget" id="scoreWidget">
                                    <span class="score-label" id="scoreLabel">Chia điểm</span>
                                    <div class="score-input-box" id="scoreInputBox" style="display:none;">
                                        <input type="number" id="scoreInput" min="0" step="0.5" placeholder="điểm">
                                    </div>
                                    <span class="score-value" id="scoreValue" style="display:none;"></span>
                                </div>
                            </div>
                        </div>
                        <div class="action-group">
                            <a href="/de-thi" class="btn btn-text">Hủy bỏ</a>
                            <button type="button" class="btn btn-outline" id="btnSaveDraft">Lưu bản nháp</button>
                            <button type="button" class="btn btn-primary" id="btnContinue"><i class="fa-solid fa-floppy-disk"></i> Lưu đề thi</button>
                        </div>
                    </div>
                </div>

                <div class="editor-workspace">
                    <div class="pane left-pane">
                        <div class="pane-header">
                            <h2>XEM TRƯỚC TRỰC TIẾP</h2>
                            <div class="pane-icons">
                                <button type="button"><i class="fa-solid fa-magnifying-glass"></i></button>
                                <button type="button"><i class="fa-solid fa-print"></i></button>
                            </div>
                        </div>
                        <div class="pane-content preview-content" id="livePreviewContainer"></div>
                    </div>

                    <div class="pane right-pane">
                        <div class="pane-header">
                            <h2>TRÌNH CHỈNH SỬA VĂN BẢN THÔ</h2>
                            <span class="hint">Thêm <code>*</code> trước chữ cái đáp án để chọn đáp án đúng</span>
                            <button type="button" class="btn-sync" id="btnSync">
                                <i class="fa-solid fa-rotate"></i> Đồng bộ thay đổi
                            </button>
                        </div>
                        <div class="pane-content editor-content">
                            <div class="line-numbers" id="lineNumbers"></div>
                            <textarea id="rawEditor" spellcheck="false" wrap="off"></textarea>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>
</div>

<script th:src="@{/js/sua-de-thi.js}"></script>
</body>
</html>
