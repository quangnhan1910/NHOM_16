version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: nhom16-db
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: nhom16_db
      MYSQL_USER: nhom16
      MYSQL_PASSWORD: nhom16pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: nhom16-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/nhom16_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: nhom16
      SPRING_DATASOURCE_PASSWORD: nhom16pass
    ports:
      - "8080:8080"

volumes:
  db_data: